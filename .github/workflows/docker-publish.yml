name: Build and publish Docker image

# Build the image and push it to GHCR as :latest on every push to main, plus a
# manual button. No versioning — latest is always overwritten, so the server just
# pulls latest to get the newest build.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercases the repo name for the image ref (GHCR requires lowercase) and
      # attaches OCI labels so the package links back to this repo.
      - name: Derive image name and tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64  # Synology J3455 is x86-64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Push a single plain image manifest, not an OCI index. Buildx otherwise
          # attaches a provenance attestation (an unknown/unknown entry), which the
          # legacy Synology Docker app can't parse ("Registry returned bad result").
          provenance: false
          sbom: false
          # Reuse layers between runs so a code-only change doesn't reinstall ffmpeg/opencv.
          cache-from: type=gha
          cache-to: type=gha,mode=max
